services:
    mongo:
        image: mongo:8
        ports:
            - 27017:27017
        volumes:
            - mongo_data_gemmashop:/data/db
        environment:
            - MONGO_INITDB_ROOT_USERNAME=admin
            - MONGO_INITDB_ROOT_PASSWORD=secure_password
        command: ['--replSet', 'rs0']

    # One-time init container to configure the replica set
    mongo-init:
        image: mongo:8
        depends_on:
            - mongo
        restart: 'no'
        entrypoint: >
            mongosh --host mongo:27017 -u admin -p secure_password --authenticationDatabase admin --eval "
            try { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }); } catch(e) { if (e.codeName !== 'AlreadyInitialized') throw e; }
            "

volumes:
    mongo_data_gemmashop:
