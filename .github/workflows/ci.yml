name: CI

on:
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    quality-and-build:
        runs-on: ubuntu-latest
        env:
            CI: true
            VITE_BASE_URL: http://localhost:3670
            SERVER_DATABASE_URL: mongodb://127.0.0.1:27017/gemmashop?directConnection=true
            SERVER_AUTH_SECRET: 00000000000000000000000000000000
            SERVER_CONFIG_ENCRYPTION_KEY: ci-test-config-key
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.11

            - name: Install dependencies
              run: bun install

            - name: Lint
              run: bun run lint

            - name: Format check
              run: bun run format:check

            - name: Build web app
              run: bun run build --filter=@repo/web

    playwright-e2e:
        runs-on: ubuntu-latest
        needs: quality-and-build
        if: ${{ hashFiles('playwright.config.ts', 'playwright.config.js', 'apps/web/playwright.config.ts', 'apps/web/playwright.config.js') != '' }}
        services:
            mongo:
                image: mongo:7
                ports:
                    - 27017:27017
        env:
            CI: true
            VITE_BASE_URL: http://127.0.0.1:3670
            SERVER_DATABASE_URL: mongodb://127.0.0.1:27017/gemmashop?directConnection=true
            SERVER_AUTH_SECRET: 00000000000000000000000000000000
            SERVER_CONFIG_ENCRYPTION_KEY: ci-test-config-key
            ALLOWED_HOSTS: http://127.0.0.1:3670
            TRUSTED_ORIGINS: http://127.0.0.1:3670
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.11

            - name: Install dependencies
              run: bun install

            - name: Install Playwright browsers
              run: bunx playwright install --with-deps chromium

            - name: Run Playwright tests
              run: bunx playwright test
